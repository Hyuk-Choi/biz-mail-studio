services:
  - type: web
    name: bizmail-studio
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: corepack enable && pnpm start:host
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MAIL_GENERATION_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
